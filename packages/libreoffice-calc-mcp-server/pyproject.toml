[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "libreoffice-calc-mcp-server"
version = "0.1.0"
description = "MCP server for LibreOffice Calc integration via UNO"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "MCP Proxy Monorepo Contributors" }
]
keywords = ["mcp", "model-context-protocol", "libreoffice", "calc", "uno"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[project.scripts]
libreoffice-calc-mcp = "libreoffice_calc_mcp:main"

[project.urls]
Homepage = "https://github.com/RhoMancer/mcp-proxy-monorepo"
Repository = "https://github.com/RhoMancer/mcp-proxy-monorepo"

[tool.hatch.build.targets.wheel]
packages = ["src/libreoffice_calc_mcp"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "N", "UP"]
target-version = "py310"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
