name: MCP Proxy Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  validation-tests:
    name: Validation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run LibreOffice validation tests
        run: npm run test:libreoffice

      - name: Run OAuth validation tests
        run: npm run test:oauth

  oauth-e2e-tests:
    name: OAuth E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Mock OAuth provider for testing
      oauth-mock:
        image: ghcr.io/navikt/mock-oauth2-server:latest
        ports:
          - 8081:8080
        env:
          SERVER_PORT: 8080
          TOKEN_EXPIRATION_MS: 3600000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Start MCP Proxy with OAuth
        run: |
          cd packages/mcp-http-proxy
          npx mcp-proxy --config examples/echo-test.config.js &
          sleep 5

      - name: Run OAuth E2E tests
        run: npm run test:oauth-e2e
        env:
          PROXY_URL: http://127.0.0.1:8080

      - name: Stop proxy
        if: always()
        run: pkill -f mcp-proxy || true
